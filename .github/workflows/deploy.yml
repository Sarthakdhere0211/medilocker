# MediLocker Continuous Deployment
# This workflow automates the production deployment to Vercel when changes are pushed to main.

name: MediLocker CD

on:
  push:
    branches: [ main, master ] # Triggers ONLY on push to main or master branches

jobs:
  deploy:
    name: 🚀 CD: Deploy to Vercel
    runs-on: ubuntu-latest
    
    steps:
      - name: 🔍 Checkout Repository
        uses: actions/checkout@v4
        # Fetches the source code

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: ⚡ Install Vercel CLI
        run: npm install --global vercel@latest
        # Installs the Vercel CLI globally inside the runner

      - name: 📥 Pull Vercel Project Settings
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        # Pulls the latest project settings from Vercel using GitHub Secrets

      - name: 🏗️ Build Project Artifacts (Vercel)
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        # Pre-builds the project artifacts on Vercel infrastructure

      - name: 🚀 Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        # Deploys the pre-built artifacts to the production environment
